spring.application.name=VentasSantaMarta-API
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/santamarta_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:santa_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:santa_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# API configuration
server.port=8080
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
